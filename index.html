<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mosap Tools</title>
  <style>
    :root {
      --bg: #0a0c10;
      --card: #161b22;
      --accent: #58a6ff;
      --text: #c9d1d9;
      --text-light: #8b949e;
    }
    
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .header {
      background: rgba(22, 27, 34, 0.95);
      backdrop-filter: blur(10px);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 1.55rem;
      font-weight: 600;
      color: var(--accent);
    }

    .menu-btn {
      background: none;
      border: none;
      font-size: 30px;
      color: var(--text);
      cursor: pointer;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .menu-btn:hover { background: #21262d; }

    .sidebar {
      position: fixed;
      top: 0;
      right: -300px;
      width: 300px;
      height: 100vh;
      background: var(--card);
      padding: 25px 20px;
      transition: right 0.4s ease;
      z-index: 200;
      box-shadow: -5px 0 15px rgba(0,0,0,0.5);
    }
    .sidebar.open { right: 0; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 150;
      display: none;
      backdrop-filter: blur(3px);
    }
    .overlay.show { display: block; }

    .sidebar h2 {
      color: var(--accent);
      margin-bottom: 25px;
      padding-bottom: 10px;
      border-bottom: 1px solid #30363d;
    }

    .tool-btn {
      width: 100%;
      padding: 18px 16px;
      margin: 8px 0;
      background: #21262d;
      color: var(--text);
      border: 1px solid #30363d;
      border-radius: 12px;
      font-size: 17px;
      text-align: right;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tool-btn:hover {
      background: #30363d;
      border-color: var(--accent);
      transform: translateX(-4px);
    }

    .main-content {
      padding: 20px;
      margin-top: 70px;
    }

    iframe {
      width: 100%;
      height: 78vh;
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      background: white;
    }

    .welcome {
      text-align: center;
      margin-top: 120px;
      color: var(--text-light);
      font-size: 1.1rem;
    }

    .welcome small {
      display: block;
      margin-top: 12px;
      opacity: 0.7;
    }

    @media (min-width: 768px) {
      .sidebar {
        position: relative;
        right: 0;
        width: 300px;
        height: auto;
        box-shadow: none;
      }
      .main-content {
        margin-top: 0;
        padding: 30px 30px 30px 330px;
      }
      .menu-btn, .overlay { display: none; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Mosap Tools</h1>
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  </div>

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <h2>Available Tools</h2>
    
    <button class="tool-btn" onclick="loadTool('french-reader.html')">
      📖 French Reader
    </button>
    
    <button class="tool-btn" onclick="loadTool('A0-Paragraphs.html')">
      📝 A0 - Paragraphs
    </button>
    
    <button class="tool-btn" onclick="loadTool('A0-Practice.html')">
      ⚡ A0 - Practice
    </button>
  </div>

  <div class="main-content">
    <iframe id="toolFrame" src="about:blank"></iframe>
    
    <div id="welcome" class="welcome">
      Welcome to my personal tools<br>
      Choose a tool from the menu to start
      <small>All tools work offline after first load</small>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }

    function loadTool(filename) {
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('toolFrame').src = filename;

      if (window.innerWidth < 768) {
        toggleSidebar();
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape") {
        const sidebar = document.getElementById('sidebar');
        if (sidebar.classList.contains('open')) toggleSidebar();
      }
    });
  </script>
</body>
</html>
