<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أدواتي الشخصية</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0d1117;
      color: #c9d1d9;
    }
    .header {
      background: #161b22;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #30363d;
    }
    .container {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 280px;
      background: #161b22;
      padding: 20px;
      border-left: 1px solid #30363d; /* لأن dir=rtl */
    }
    .main-content {
      flex: 1;
      padding: 20px;
    }
    h1 { margin: 0; color: #58a6ff; }
    h2 { color: #c9d1d9; }
    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      text-align: right;
    }
    button:hover {
      background: #30363d;
      border-color: #58a6ff;
    }
    iframe {
      width: 100%;
      height: 85vh;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: white;
    }
    .empty {
      text-align: center;
      color: #8b949e;
      margin-top: 100px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>أدواتي الشخصية</h1>
    <p>مجموعة أدواتي التعليمية والتفاعلية</p>
  </div>

  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <h2>الأدوات المتاحة</h2>
      <button onclick="loadTool('french-reader.html')">📖 French Reader</button>
      <button onclick="loadTool('A0-Paragraphs.html')">📘 A0 Paragraphs</button>
      <button onclick="loadTool('A0-Practice.html')">🏋🏻‍♀️ A0 Practice</button>
      <!-- هنا هتضيف باقي أدواتك لاحقًا -->
      <!-- مثال:
      <button onclick="loadTool('vocabulary.html')">📝 أداة المفردات</button>
      -->
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <iframe id="toolFrame" src="about:blank"></iframe>
      <div id="welcome" class="empty">
        اختر أداة من الجانب عشان تبدأ
      </div>
    </div>
  </div>

  <script>
    function loadTool(filename) {
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('toolFrame').src = filename;
    }
  </script>
</body>
</html>
