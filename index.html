<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Mosap Tools</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #121212;
      --accent: #00b4ff;
      --text: #e0e0e0;
      --text-light: #aaaaaa;
      --border: #222222;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      background: rgba(18, 18, 18, 0.95);
      backdrop-filter: blur(12px);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
      
      /* Changed to center the title */
      display: flex;
      align-items: center;
      justify-content: center; 
      position: relative;
    }

    .header h1 {
      font-size: 1.65rem;
      font-weight: 600;
      color: var(--accent);
      text-align: center;
    }

    .menu-btn {
      background: none;
      border: none;
      font-size: 32px;
      color: var(--text);
      cursor: pointer;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      
      /* Positioned to the right */
      position: absolute;
      right: 20px; 
    }
    .menu-btn:hover { background: #1f1f1f; }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      right: -340px;
      width: 340px;
      height: 100vh;
      background: var(--card);
      padding: 30px 20px;
      transition: right 0.4s ease;
      z-index: 200;
      box-shadow: -10px 0 30px rgba(0,0,0,0.7);
    }
    .sidebar.open { right: 0; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 150;
      display: none;
      backdrop-filter: blur(5px);
    }
    .overlay.show { display: block; }

    .sidebar h2 {
      color: var(--accent);
      margin-bottom: 25px;
      font-size: 1.35rem;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .tool-btn {
      width: 100%;
      padding: 16px 20px;
      margin: 8px 0;
      background: #1a1a1a;
      color: var(--text);
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      font-size: 16.5px;
      text-align: right;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tool-btn:hover {
      background: #242424;
      border-color: var(--accent);
      transform: translateX(-5px);
    }

    /* Landing Page */
    .landing {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #0a0a0a 0%, #121212 100%);
    }

    .landing h1 {
      font-size: 3.1rem;
      margin-bottom: 12px;
      color: var(--accent);
      font-weight: 500;
    }

    .landing p {
      font-size: 1.25rem;
      max-width: 520px;
      color: var(--text-light);
      margin-bottom: 45px;
      line-height: 1.5;
    }

    .start-btn {
      padding: 16px 42px;
      font-size: 1.15rem;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .start-btn:hover {
      transform: scale(1.06);
      background: #4cc6ff;
    }

    /* Main Content */
    .main-content {
      display: none;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    iframe {
      width: 100%;
      height: 84vh;
      border: none;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
      background: white;
    }

    /* Responsive */
    @media (min-width: 768px) {
      .sidebar { width: 340px; }
      .main-content { padding: 30px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>Mosap Tools</h1>
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <h2>Available Tools</h2>
    
    <button class="tool-btn" onclick="loadTool('french-reader.html')">
      📖 French Reader
    </button>
    
    <button class="tool-btn" onclick="loadTool('A0-Paragraphs.html')">
      📝 A0 - Paragraphs
    </button>
    
    <button class="tool-btn" onclick="loadTool('A0-Practice.html')">
      ⚡ A0 - Practice
    </button>

    <button class="tool-btn" onclick="loadTool('canada_crs_calculator.html')">
      CRS CALCULATOR
    </button>
     </div>

  <!-- Landing Page -->
  <div class="landing" id="landing">
    <h1>Welcome to Mosap Tools</h1>
    <p>my personal learning tools<br>fun way to learn</p>
    <button class="start-btn" onclick="startUsing()">COMMENCER</button>
  </div>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">
    <iframe id="toolFrame" src="about:blank"></iframe>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }

    function startUsing() {
      document.getElementById('landing').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      
      setTimeout(() => {
        toggleSidebar();
      }, 500);
    }

    function loadTool(filename) {
      document.getElementById('toolFrame').src = filename;
      
      // CLOSES AUTOMATICALLY every time a tool is selected
      toggleSidebar();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape") {
        const sidebar = document.getElementById('sidebar');
        if (sidebar.classList.contains('open')) toggleSidebar();
      }
    });
  </script>
</body>
</html>
